<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>For You ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--rose:#e8527a;--blush:#f7c5d0;--plum:#6b3fa0;--lavender:#c9aaee;--cream:#fff9f5;--deep:#2a1340;}
html,body{min-height:100%;font-family:'Jost',sans-serif;background:var(--deep);overflow-x:hidden;}

/* stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:.8;transform:scale(1.3);}}

/* aurora */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22;animation:drift var(--d,20s) ease-in-out infinite alternate;}
.blob1{width:500px;height:500px;background:var(--plum);top:-100px;left:-100px;--d:18s;}
.blob2{width:400px;height:400px;background:var(--rose);bottom:-80px;right:-80px;--d:22s;}
.blob3{width:350px;height:350px;background:#4a9edd;top:40%;left:40%;--d:25s;}
@keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}

/* petals */
.petal{position:fixed;font-size:16px;pointer-events:none;z-index:5;animation:fall var(--d,6s) linear var(--delay,0s) infinite;opacity:0;}
@keyframes fall{0%{transform:translateY(-40px) rotate(0deg);opacity:0;}10%{opacity:.6;}90%{opacity:.4;}100%{transform:translateY(105vh) rotate(360deg);opacity:0;}}

/* ── SIDE PHOTOS — desktop only ── */
.side-photo{
  position:fixed;
  z-index:6;
  border-radius:16px;
  overflow:hidden;
  opacity:0;
  pointer-events:none;
  box-shadow:0 14px 45px rgba(0,0,0,.6), 0 0 0 2px rgba(255,255,255,.08);
  animation:photoAppear var(--dur,14s) ease-in-out forwards;
}
.side-photo img{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes photoAppear{
  0%  {opacity:0;transform:translateY(18px) rotate(var(--rot)) scale(.85);}
  12% {opacity:var(--op);transform:translateY(0px) rotate(var(--rot)) scale(1);}
  50% {opacity:var(--op);transform:translateY(-5px) rotate(var(--rot2)) scale(1);}
  100%{opacity:var(--op);transform:translateY(-10px) rotate(var(--rot2)) scale(1);}
}

/* ── MOBILE CORNER PHOTOS ── */
/* Fixed polaroid-style photos peeking from screen corners/edges on mobile */
.corner-photo{
  position:fixed;
  z-index:6;
  border-radius:12px;
  overflow:hidden;
  pointer-events:none;
  opacity:0;
  box-shadow:0 10px 35px rgba(0,0,0,.65), 0 0 0 2px rgba(255,255,255,.08);
  animation:cornerAppear var(--dur,13s) ease-in-out forwards;
}
.corner-photo img{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes cornerAppear{
  0%  {opacity:0;transform:translate(var(--tx0),var(--ty0)) rotate(var(--rot)) scale(.8);}
  15% {opacity:var(--op);transform:translate(var(--tx1),var(--ty1)) rotate(var(--rot)) scale(1);}
  85% {opacity:var(--op);transform:translate(var(--tx1),var(--ty1)) rotate(var(--rot)) scale(1);}
  100%{opacity:var(--op);transform:translate(var(--tx1),var(--ty1)) rotate(var(--rot2)) scale(1);}
}

/* intro */
.page{position:relative;z-index:10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:30px 20px;}
.intro-card{
  width:100%;max-width:620px;
  background:rgba(255,249,245,.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:clamp(36px,8vw,60px) clamp(24px,7vw,50px);
  text-align:center;
  backdrop-filter:blur(30px);
  box-shadow:0 0 0 1px rgba(255,255,255,.05) inset,0 30px 80px rgba(0,0,0,.5);
  animation:rise .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
.intro-card h2{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,6vw,38px);font-style:italic;font-weight:300;color:var(--cream);line-height:1.45;margin-bottom:16px;}
.intro-card .sub{font-size:clamp(10px,2.5vw,13px);font-weight:200;letter-spacing:3px;text-transform:uppercase;color:var(--lavender);margin-bottom:36px;}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:clamp(13px,3vw,16px) clamp(28px,8vw,44px);
  border-radius:60px;border:none;
  background:linear-gradient(135deg,var(--rose),var(--plum));
  color:white;font-family:'Jost',sans-serif;
  font-size:clamp(12px,3vw,14px);letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:.35s;
  box-shadow:0 8px 30px rgba(232,82,122,.35);
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.97);}

/* message page */
.message-page{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(30px,6vw,50px) 16px clamp(60px,10vw,80px);
}
.hearts-row{display:flex;gap:12px;margin-bottom:clamp(24px,5vw,40px);opacity:0;transition:opacity 1s ease;}
.hearts-row.show{opacity:1;}
.h{font-size:clamp(28px,7vw,36px);animation:hb 1.8s ease-in-out infinite;display:inline-block;}
.h:nth-child(2){font-size:clamp(34px,9vw,44px);animation-delay:.2s;}.h:nth-child(3){animation-delay:.4s;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

.msg-card{
  width:100%;max-width:660px;
  background:rgba(255,249,245,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:28px;
  padding:clamp(28px,7vw,70px) clamp(20px,6vw,65px);
  backdrop-filter:blur(30px);
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 30px 80px rgba(0,0,0,.5);
}
.msg-card::before{content:"";display:block;width:50px;height:2px;background:linear-gradient(90deg,var(--rose),var(--plum));border-radius:2px;margin:0 auto clamp(24px,5vw,36px);}

.text-body{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(17px,4.5vw,24px);
  line-height:2;
  color:rgba(255,249,245,.88);
}
.line{opacity:0;transform:translateY(18px);transition:opacity .9s ease,transform .9s ease;display:block;margin:3px 0;}
.line.show{opacity:1;transform:translateY(0);}
.line.special{font-size:clamp(19px,5vw,27px);font-style:italic;color:var(--blush);font-weight:600;margin-top:10px;}
.line.em{color:var(--lavender);font-style:italic;}
.spacer{height:12px;display:block;}

.bday{
  margin-top:clamp(28px,6vw,44px);
  padding-top:clamp(24px,5vw,36px);
  border-top:1px solid rgba(255,255,255,.08);
  text-align:center;
  opacity:0;transform:translateY(24px);
  transition:all 1.1s cubic-bezier(.22,1,.36,1);
}
.bday.show{opacity:1;transform:translateY(0);}
.bday-main{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,6vw,34px);font-style:italic;color:var(--rose);margin-bottom:10px;}
.bday-sub{font-size:clamp(9px,2.5vw,11px);letter-spacing:4px;text-transform:uppercase;color:var(--lavender);opacity:.7;}

.hidden{display:none!important;}
</style>
</head>
<body>

<div class="aurora">
  <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
</div>
<div class="stars" id="stars"></div>
<div id="petals"></div>
<div id="side-photos"></div>

<div class="page" id="intro">
  <div class="intro-card">
    <h2>There's something special<br>I want to tell you…</h2>
    <p class="sub">A message from the heart</p>
    <button class="btn" onclick="start()">Open Your Message &nbsp;💝</button>
  </div>
</div>

<div class="message-page hidden" id="main">
  <div class="hearts-row" id="hearts">
    <span class="h">♡</span><span class="h">❤️</span><span class="h">♡</span>
  </div>
  <div class="msg-card">
    <div class="text-body" id="text"></div>
    <div class="bday" id="bday">
      <div class="bday-main">Happy Birthday, My Love 🎂</div>
      <div class="bday-sub">You make every day worth living</div>
    </div>
  </div>
</div>

// Stars
var st=document.getElementById('stars');
for(var s=0;s<110;s++){var d=document.createElement('div');d.className='star';var sz=Math.random()*3+1;d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:'+Math.random()*5+'s;';st.appendChild(d);}

// Petals
var pe=document.getElementById('petals');
['🌸','🌺','✿','❀','🌷'].forEach(function(c){for(var p=0;p<3;p++){var pd=document.createElement('div');pd.className='petal';pd.textContent=c;pd.style.cssText='left:'+Math.random()*100+'%;--d:'+(5+Math.random()*8)+'s;--delay:'+Math.random()*12+'s;';pe.appendChild(pd);}});

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function rand(a,b){return a+Math.random()*(b-a);}

var isMobile = window.innerWidth < 700;

function startPhotoRain(){
  var container = document.getElementById('side-photos');
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var imgs = shuffle(PHOTOS.slice());

  if(!isMobile){
    // ── DESKTOP: side panels, 3 left + 3 right ──
    var cardW  = Math.min(660, vw - 40);
    var cardX  = (vw - cardW) / 2;
    var leftW  = cardX;
    var rightW = vw - cardX - cardW;
    var slots  = [];

    if(leftW > 90){
      var pw = Math.min(leftW - 28, 195);
      var ph = Math.round(pw * 1.3);
      for(var r=0;r<3;r++){
        var rowH = vh/3;
        slots.push({
          x: 8 + rand(0, Math.max(0, leftW-pw-18)),
          y: Math.max(8, r*rowH + rand(10, rowH-ph-16)),
          w:pw, h:ph,
          rot:rand(-7,7).toFixed(1),
          rot2:rand(-7,7).toFixed(1),
          op:.83
        });
      }
    }
    if(rightW > 90){
      var pw2 = Math.min(rightW - 28, 195);
      var ph2 = Math.round(pw2 * 1.3);
      var rs  = cardX + cardW;
      for(var r2=0;r2<3;r2++){
        var rowH2 = vh/3;
        slots.push({
          x: rs + 8 + rand(0, Math.max(0, rightW-pw2-18)),
          y: Math.max(8, r2*rowH2 + rand(10, rowH2-ph2-16)),
          w:pw2, h:ph2,
          rot:rand(-7,7).toFixed(1),
          rot2:rand(-7,7).toFixed(1),
          op:.83
        });
      }
    }

    var count = Math.min(slots.length, imgs.length);
    for(var idx=0;idx<count;idx++){
      (function(slot,src,delay){
        setTimeout(function(){
          var el=document.createElement('div');
          el.className='side-photo';
          var dur=rand(12,18).toFixed(1);
          el.style.cssText=[
            'left:'+slot.x.toFixed(0)+'px',
            'top:'+slot.y.toFixed(0)+'px',
            'width:'+slot.w+'px',
            'height:'+slot.h+'px',
            '--rot:'+slot.rot+'deg',
            '--rot2:'+slot.rot2+'deg',
            '--op:'+slot.op,
            '--dur:'+dur+'s'
          ].join(';');
          el.innerHTML='<img src="'+src+'" alt="">';
          container.appendChild(el);
        }, delay);
      })(slots[idx], imgs[idx], 800 + idx*1800);
    }

  } else {
    // ── MOBILE: 6 photos peek from screen edges/corners ──
    // Positions: top-left, top-right, mid-left, mid-right, bottom-left, bottom-right
    // Photos are partially off-screen so they "peek" without blocking text

    var pw = Math.round(vw * 0.38); // ~38% of screen width
    var ph = Math.round(pw * 1.25);

    // Each slot: final resting position (tx1,ty1) and entry offset (tx0,ty0)
    var mSlots = [
      // top-left corner — peeks from top-left
      {left: -pw*0.28, top: -ph*0.22, tx0:'-20px', ty0:'-20px', tx1:'0px', ty1:'0px', rot:rand(6,12).toFixed(1)},
      // top-right corner
      {left: vw-pw*0.72, top: -ph*0.22, tx0:'20px', ty0:'-20px', tx1:'0px', ty1:'0px', rot:rand(-12,-6).toFixed(1)},
      // mid-left — half off screen left
      {left: -pw*0.32, top: vh*0.35, tx0:'-25px', ty0:'0px', tx1:'0px', ty1:'0px', rot:rand(5,10).toFixed(1)},
      // mid-right — half off screen right
      {left: vw-pw*0.68, top: vh*0.35, tx0:'25px', ty0:'0px', tx1:'0px', ty1:'0px', rot:rand(-10,-5).toFixed(1)},
      // bottom-left
      {left: -pw*0.28, top: vh-ph*0.78, tx0:'-20px', ty0:'20px', tx1:'0px', ty1:'0px', rot:rand(-10,-4).toFixed(1)},
      // bottom-right
      {left: vw-pw*0.72, top: vh-ph*0.78, tx0:'20px', ty0:'20px', tx1:'0px', ty1:'0px', rot:rand(4,10).toFixed(1)},
    ];

    for(var mi=0;mi<Math.min(mSlots.length,imgs.length);mi++){
      (function(slot,src,delay){
        setTimeout(function(){
          var el=document.createElement('div');
          el.className='corner-photo';
          var dur=rand(13,20).toFixed(1);
          var rot2=(parseFloat(slot.rot)+rand(-3,3)).toFixed(1);
          el.style.cssText=[
            'left:'+slot.left.toFixed(0)+'px',
            'top:'+slot.top.toFixed(0)+'px',
            'width:'+pw+'px',
            'height:'+ph+'px',
            '--tx0:'+slot.tx0,
            '--ty0:'+slot.ty0,
            '--tx1:'+slot.tx1,
            '--ty1:'+slot.ty1,
            '--rot:'+slot.rot+'deg',
            '--rot2:'+rot2+'deg',
            '--op:0.78',
            '--dur:'+dur+'s'
          ].join(';');
          el.innerHTML='<img src="'+src+'" alt="">';
          container.appendChild(el);
        }, delay);
      })(mSlots[mi], imgs[mi], 700 + mi*1700);
    }
  }
}

// Letter lines
var lines=[
  {t:"Before you came into my life,"},
  {t:"everything felt ordinary.",cls:"em"},
  {t:""},
  {t:"It wasn't bad."},
  {t:"It just wasn't… alive.",cls:"em"},
  {t:""},
  {t:"And then you arrived,"},
  {t:"like sunrise after the longest night.",cls:"em"},
  {t:""},
  {t:"Suddenly,"},
  {t:"the same world felt magical."},
  {t:"Colors became brighter."},
  {t:"Moments became precious.",cls:"em"},
  {t:""},
  {t:"You didn't just change my world —",cls:"special"},
  {t:"You became my world.",cls:"special"},
  {t:""},
  {t:"And on this special day,"},
  {t:"I want you to know:"},
  {t:"Every day with you is a gift."},
  {t:"But today, we celebrate you.",cls:"em"},
  {t:""},
  {t:"My love. My light. My everything.",cls:"special"},
];

function start(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  setTimeout(function(){document.getElementById('hearts').classList.add('show');},300);
  setTimeout(showLines,1100);
  startPhotoRain();
}

var i=0;
function showLines(){
  if(i>=lines.length){
    setTimeout(function(){document.getElementById('bday').classList.add('show');},600);
    return;
  }
  var l=lines[i],el=document.createElement('span');
  if(!l.t){el.className='spacer';}
  else{el.className='line'+(l.cls?' '+l.cls:'');el.textContent=l.t;}
  document.getElementById('text').appendChild(el);
  setTimeout(function(){el.classList.add('show');},80);
  i++;
  setTimeout(showLines,!l.t?400:l.cls==='special'?1300:950);
}
